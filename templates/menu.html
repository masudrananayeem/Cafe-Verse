<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Menu</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            background:
                linear-gradient(rgba(0, 0, 0, .55),
                    rgba(0, 0, 0, .55)),
                url("/static/images/dashboard-2.avif");

            background-size: cover;
            background-position: center;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #3e2c21;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, .1);
        }

        .card h2 {
            color: #3e2c21;
        }

        .price {
            color: #b8860b;
            font-size: 22px;
            font-weight: bold;
            margin-top: 15px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            background: #3e2c21;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #3e2c21;
            padding: 25px;
            color: white;

        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin: 20px 0;
        }

        .sidebar ul li a {

            display: flex;
            align-items: center;

            gap: 10px;

            padding: 14px 18px;

            border-radius: 12px;

            transition: .3s;

            color: white;

            text-decoration: none;
        }

        .sidebar ul li a:hover {

            background: rgba(255, 255, 255, .12);

            transform: translateX(8px);
        }

        .main {
            margin-left: 260px;
            padding: 30px;
        }
    </style>

</head>

<body>

    <div class="sidebar">

        <div class="logo">
            🍵 Cafe Verse
        </div>

        <ul>
            <li><a href="/dashboard">🏠 Dashboard</a></li>
            <li><a href="/menu">☕ Tea Menu</a></li>
            <li><a href="/cart">🛒 My Cart</a></li>
            <li><a href="#">👤 Profile</a></li>
            <li><a href="/logout">🚪 Logout</a></li>
        </ul>

    </div>
    <div class="main">


        <h1>☕ Tea Menu</h1>

        <div class="container">

            {% for tea in teas %}

            <div class="card">

                <h2>{{ tea[1] }}</h2>

                <p>{{ tea[3] }}</p>

                <div class="price">
                    $ {{ tea[2] }}
                </div>

                <a href="/add_cart/{{ tea[0] }}" class="btn">
                    Add To Cart
                </a>

            </div>

            {% endfor %}

        </div>


    </div>

</body>

</html>
