<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CafeVerse Menu</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            background:
            linear-gradient(
            rgba(0,0,0,.55),
            rgba(0,0,0,.55)
            ),
            url("/static/images/dashboard-2.avif");

            background-size:cover;
            background-position:center;
            background-attachment:fixed;
        }

        /* Sidebar */

        .sidebar{

            position:fixed;
            left:0;
            top:0;

            width:260px;
            height:100vh;

            background:#3e2c21;

            padding:25px;

            color:white;
        }

        .logo{

            font-size:30px;
            font-weight:700;

            margin-bottom:40px;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            margin:20px 0;
        }

        .sidebar ul li a{

            display:flex;
            align-items:center;

            gap:10px;

            padding:14px 18px;

            border-radius:12px;

            transition:.3s;

            color:white;

            text-decoration:none;
        }

        .sidebar ul li a:hover{

            background:rgba(255,255,255,.12);

            transform:translateX(8px);
        }

        /* Main */

        .main{

            margin-left:260px;
            padding:40px;
        }

        h1{

            text-align:center;

            color:white;

            margin-bottom:40px;

            font-size:45px;
        }

        .container{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(320px,1fr));

            gap:30px;
        }

        .card{

            background:white;

            border-radius:20px;

            overflow:hidden;

            box-shadow:0 10px 25px rgba(0,0,0,.2);

            transition:.3s;
        }

        .card:hover{

            transform:translateY(-10px);
        }

        .tea-image{

            width:100%;

            height:250px;

            object-fit:cover;
        }

        .card-body{

            padding:25px;
        }

        .card h2{

            color:#3e2c21;

            margin-bottom:10px;
        }

        .card p{

            color:#666;

            line-height:1.6;
        }

        .price{

            color:#b8860b;

            font-size:24px;

            font-weight:bold;

            margin-top:15px;
        }

        .btn{

            display:inline-block;

            margin-top:20px;

            background:#3e2c21;

            color:white;

            text-decoration:none;

            padding:12px 22px;

            border-radius:10px;

            transition:.3s;
        }

        .btn:hover{

            background:#6f4e37;
        }

    </style>

</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            ☕ CafeVerse
        </div>

        <ul>

            <li><a href="/dashboard">🏠 Dashboard</a></li>

            <li><a href="/menu">☕ Menu</a></li>

            <li><a href="/cart">🛒 My Cart</a></li>

            <li><a href="#">👤 Profile</a></li>

            <li><a href="/logout">🚪 Logout</a></li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <h1>☕ CafeVerse Menu</h1>

        <div class="container">

            {% for tea in teas %}

            <div class="card">

                <img
                    src="/static/uploads/{{ tea[4] }}"
                    alt="{{ tea[1] }}"
                    class="tea-image">

                <div class="card-body">

                    <h2>{{ tea[1] }}</h2>

                    <p>{{ tea[3] }}</p>

                    <div class="price">
                        ${{ tea[2] }}
                    </div>

                    <a href="/add_cart/{{ tea[0] }}"
                       class="btn">

                        Add To Cart

                    </a>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
