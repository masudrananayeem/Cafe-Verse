<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | CafeVerse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0b0a0f;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, .08);
        }

        .active-menu {
            background: linear-gradient(135deg, #6f4e37, #b08968);
        }

        input,
        textarea {
            background: rgba(255, 255, 255, .06) !important;
            border: 1px solid rgba(255, 255, 255, .08) !important;
            color: white !important;
        }

        input::placeholder,
        textarea::placeholder {
            color: #9ca3af;
        }

        input:focus,
        textarea:focus {
            outline: none !important;
            box-shadow: 0 0 15px rgba(176, 137, 104, .4) !important;
            border-color: #b08968 !important;
        }
    </style>

</head>

<body>

    <!-- Sidebar -->

    <aside class="fixed top-0 left-0 w-64 h-screen glass border-r border-white/10">

        <div class="p-6 border-b border-white/10">

     <img src="{{ url_for('static', filename='images/logo.png') }}"
     alt="CafeVerse Logo"
     class="h-16 w-auto object-contain">

        </div>

        <nav class="p-4 space-y-3">

            <a href="/admin"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10 duration-300">

                <i class="fa-solid fa-chart-line"></i>
                Dashboard

            </a>

            <a href="/manage-products"
                class="active-menu flex items-center gap-3 p-4 rounded-xl">

                <i class="fa-solid fa-mug-hot"></i>
                Products

            </a>

            <a href="/logout"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-red-500 duration-300">

                <i class="fa-solid fa-right-from-bracket"></i>
                Logout

            </a>

        </nav>

    </aside>


    <!-- Main Content -->

    <div class="ml-64 min-h-screen flex justify-center items-center p-8">

        <div class="glass rounded-3xl p-10 w-full max-w-3xl">

            <div class="text-center mb-10">

                <h1 class="text-5xl font-bold mb-3">
                    ☕ Add New Product
                </h1>

                <p class="text-gray-400">
                    Add new coffee or tea products to your menu.
                </p>

            </div>

            <form action="/add-product"
                method="POST"
                enctype="multipart/form-data"
                class="space-y-6">

                <!-- Product Name -->

                <div>

                    <label class="block mb-2 text-lg">
                        Product Name
                    </label>

                    <input type="text"
                        name="tea_name"
                        placeholder="Enter product name"
                        required
                        class="w-full p-4 rounded-xl">

                </div>


                <!-- Price -->

                <div>

                    <label class="block mb-2 text-lg">
                        Price ($)
                    </label>

                    <input type="number"
                        step="0.01"
                        name="price"
                        placeholder="Enter price"
                        required
                        class="w-full p-4 rounded-xl">

                </div>


                <!-- Description -->

                <div>

                    <label class="block mb-2 text-lg">
                        Description
                    </label>

                    <textarea rows="5"
                        name="description"
                        placeholder="Write product description..."
                        class="w-full p-4 rounded-xl"></textarea>

                </div>


                <!-- Image Upload -->

                <div>

                    <label class="block mb-2 text-lg">
                        Product Image
                    </label>

                    <input type="file"
                        name="image"
                        accept="image/*"
                        class="w-full p-4 rounded-xl">

                </div>


                <!-- Buttons -->

                <div class="flex gap-4">

                    <button type="submit"
                        class="flex-1 py-4 rounded-xl
                        bg-gradient-to-r
                        from-[#6f4e37]
                        to-[#b08968]
                        hover:scale-105 duration-300">

                        <i class="fa-solid fa-plus"></i>
                        Add Product

                    </button>

                    <a href="/manage-products"
                        class="flex-1 py-4 rounded-xl text-center
                        bg-gray-700 hover:bg-gray-600 duration-300">

                        <i class="fa-solid fa-arrow-left"></i>
                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
