<style>
    body{
        background:#f5f5f5;
        font-family:'Poppins',sans-serif;
    }

    .form-box{
        max-width:600px;
        margin:60px auto;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 5px 20px rgba(0,0,0,.1);
    }

    h1{
        text-align:center;
        margin-bottom:30px;
        color:#3e2c21;
    }

    .btn-custom{
        width:100%;
        background:#3e2c21;
        color:white;
        padding:12px;
        border:none;
        border-radius:10px;

    .btn-custom:hover{
        background:#6f4e37;
    }
</style>
```

</head>

<body>

```
<div class="form-box">

    <h1>☕ Add New Product</h1>

    <form action="/add-product"
          method="POST"
          enctype="multipart/form-data">

        <div class="mb-3">

            <label class="form-label">
                Product Name
            </label>

            <input
                type="text"
                class="form-control"
                name="tea_name"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Price
            </label>

            <input
                type="number"
                step="0.01"
                class="form-control"
                name="price"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Description
            </label>

            <textarea
                class="form-control"
                rows="4"
                name="description"></textarea>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Product Image
            </label>

            <input
                type="file"
                class="form-control"
                name="image"
                accept="image/*">

        </div>

        <button type="submit" class="btn-custom">
            Add Product
        </button>

    </form>

</div>


</body>

</html>
