<!DOCTYPE html>
<html>

<head>

    <title>My Profile</title>

    <style>

        body{

            background:#f5f5f5;

            font-family:Poppins,sans-serif;
        }

        .profile-card{

            width:450px;

            margin:80px auto;

            background:white;

            padding:40px;

            border-radius:20px;

            text-align:center;

            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        img{

            width:150px;
            height:150px;

            border-radius:50%;

            object-fit:cover;

            margin-bottom:20px;
        }

        h2{

            color:#3e2c21;
        }

        p{

            margin:15px 0;

            color:#666;
        }

        .btn{

            display:inline-block;

            padding:12px 25px;

            background:#3e2c21;

            color:white;

            text-decoration:none;

            border-radius:10px;

            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="profile-card">

    {% if user[4] %}

    <img src="/static/uploads/{{ user[4] }}">

    {% else %}

    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    {% endif %}

    <h2>{{ user[1] }}</h2>

    <p>Email: {{ user[2] }}</p>

    <a href="/edit-profile" class="btn">
        Edit Profile
    </a>

</div>

</body>

</html>
