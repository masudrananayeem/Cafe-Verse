<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | CafeVerse</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
             background: #0b0a0f;
    background-image: url("{{ url_for('static', filename='images/back9.jpg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, .08);
        }

        .card-hover {
            transition: .4s;
        }

        .card-hover:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(176, 137, 104, .25);
        }

        .active-menu {
            background: linear-gradient(135deg, #6f4e37, #b08968);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #b08968;
            border-radius: 20px;
        }
    </style>

</head>

<body>

    <!-- Sidebar -->

    <aside class="fixed top-0 left-0 w-64 h-screen glass border-r border-white/10 z-50">

        <div class="p-6 border-b border-white/10">

             <img src="{{ url_for('static', filename='images/logo.png') }}"
     alt="CafeVerse Logo"
     class="h-16 w-auto object-contain">

        </div>

        <nav class="p-4 space-y-3">

            <a href="/admin"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10 duration-300">

                <i class="fa-solid fa-chart-line"></i>
                Dashboard

            </a>

            <a href="/manage-products"
                class="active-menu flex items-center gap-3 p-4 rounded-xl">

                <i class="fa-solid fa-mug-hot"></i>
                Products

            </a>

            <a href="/orders"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10 duration-300">

                <i class="fa-solid fa-box"></i>
                Orders

            </a>

            <a href="/users"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10 duration-300">

                <i class="fa-solid fa-users"></i>
                Users

            </a>

            <a href="#"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10 duration-300">

                <i class="fa-solid fa-chart-pie"></i>
                Analytics

            </a>

            <a href="#"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10 duration-300">

                <i class="fa-solid fa-gear"></i>
                Settings

            </a>

            <a href="/logout"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-red-500 duration-300">

                <i class="fa-solid fa-right-from-bracket"></i>
                Logout

            </a>

        </nav>

    </aside>


    <!-- Main Content -->

    <div class="ml-64 p-8">

        <!-- Header -->

        <div class="flex justify-between items-center mb-8">

            <div>
                <h1 class="text-5xl font-bold">
                    Manage Products ☕
                </h1>

                <p class="text-gray-400 mt-2 text-lg">
                    Manage all coffee and tea items from here.
                </p>
            </div>

            <a href="/add-product"
                class="bg-gradient-to-r from-[#6f4e37] to-[#b08968]
                px-6 py-4 rounded-xl text-lg
                hover:scale-105 duration-300">

                <i class="fa-solid fa-plus"></i>
                Add Product

            </a>

        </div>


        <!-- Product Grid -->

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            {% for product in products %}

            <div class="glass rounded-3xl overflow-hidden card-hover">

                <img src="/static/uploads/{{ product[4] }}"
                    class="w-full h-60 object-cover">

                <div class="p-6">

                    <h2 class="text-2xl font-bold mb-2">
                        {{ product[1] }}
                    </h2>

                    <h3 class="text-3xl font-bold text-[#ddb892] mb-4">
                        ${{ product[2] }}
                    </h3>

                    <p class="text-gray-400 mb-6">
                        {{ product[3] }}
                    </p>

                    <div class="flex gap-3">

                        <a href="/delete-product/{{ product[0] }}"
                            class="w-full text-center bg-red-500
                            hover:bg-red-600
                            py-3 rounded-xl duration-300">

                            <i class="fa-solid fa-trash"></i>
                            Delete

                        </a>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
