<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Manage Products | CafeVerse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f5f5f5;
            font-family: 'Poppins', sans-serif;
        }

        .top-section {
            background: linear-gradient(135deg, #3e2c21, #6f4e37);
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 40px;
        }

        .top-section h1 {
            font-weight: 700;
        }

        .add-btn {
            background: #fff;
            color: #3e2c21;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px 20px;
            text-decoration: none;
            transition: .3s;
        }

        .add-btn:hover {
            background: #f0f0f0;
            transform: translateY(-3px);
        }

        .product-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: .3s;
            box-shadow: 0 4px 15px rgba(0,0,0,.08);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,.15);
        }

        .product-card img {
            height: 220px;
            object-fit: cover;
        }

        .price {
            color: #6f4e37;
            font-size: 24px;
            font-weight: 700;
        }

        .delete-btn {
            width: 100%;
            border-radius: 10px;
        }
    </style>

</head>

<body>

<div class="container py-5">

    <div class="top-section d-flex justify-content-between align-items-center">

        <div>
            <h1><i class="bi bi-cup-hot-fill"></i> Manage Products</h1>
            <p>Manage all coffee and tea items from here.</p>
        </div>

        <a href="/add-product" class="add-btn">
            <i class="bi bi-plus-circle"></i> Add New Product
        </a>

    </div>

    <div class="row g-4">

        {% for product in products %}

        <div class="col-lg-4 col-md-6">

            <div class="card product-card">

                <img src="/static/uploads/{{ product[4] }}"
     class="card-img-top">

                <div class="card-body">

                    <h3 class="card-title">
                        {{ product[1] }}
                    </h3>

                    <h4 class="price">
                        ${{ product[2] }}
                    </h4>

                    <p class="card-text text-muted">
                        {{ product[3] }}
                    </p>

                    <div class="d-grid gap-2">

                        <a href="/delete-product/{{ product[0] }}"
                           class="btn btn-danger delete-btn">

                            <i class="bi bi-trash-fill"></i>
                            Delete Product

                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
