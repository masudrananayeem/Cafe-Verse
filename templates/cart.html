<!DOCTYPE html>

<html>

<head>

<title>My Cart</title>

<style>

     * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            background:
                linear-gradient(rgba(0, 0, 0, .55),
                    rgba(0, 0, 0, .55)),
                url("/static/images/dashboard-2.avif");

            background-size: cover;
            background-position: center;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            padding: 25px;
            color: white;


        }


        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin: 20px 0;
        }

        .sidebar ul li a {

            display: flex;
            align-items: center;

            gap: 10px;

            padding: 14px 18px;

            border-radius: 12px;

            transition: .3s;

            color: white;

            text-decoration: none;
        }

        .sidebar ul li a:hover {

            background: rgba(255, 255, 255, .12);

            transform: translateX(8px);
        }

        .main {
            margin-left: 260px;
            padding: 30px;
        }

    h1{
        margin-bottom:30px;
        color:#ffffff;
    }

    .cart-container{
        max-width:900px;
        margin:auto;
    }

    .cart-card{

        background:white;

        padding:25px;

        border-radius:15px;

        margin-bottom:20px;

        box-shadow:0 4px 10px rgba(0,0,0,.08);

        display:flex;

        justify-content:space-between;

        align-items:center;
    }

    .info h2{
        color:#3e2c21;
        margin-bottom:10px;
    }

    .info p{
        color:#666;
        margin:5px 0;
    }

    .delete-btn{

        background:#dc3545;

        color:white;

        text-decoration:none;

        padding:10px 18px;

        border-radius:8px;

        transition:.3s;
    }

    .delete-btn:hover{

        background:#b02a37;
    }

    .empty-cart{

    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;

    max-width:500px;

    margin:80px auto;

    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.empty-cart h2{

    color:#3e2c21;
}

</style>


</head>

<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            🍵 Cafe Verse
        </div>

        <ul>
            <li><a href="/dashboard">🏠 Dashboard</a></li>
            <li><a href="/menu">☕ Tea Menu</a></li>
            <li><a href="/cart">🛒 My Cart</a></li>
            <li><a href="/profile">👤 Profile</a></li>
            <li><a href="/logout">🚪 Logout</a></li>
        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="cart-container">

            <h1>🛒 My Cart</h1>

            {% if cart_items %}

                {% for item in cart_items %}

                <div class="cart-card">

                    <div class="info">

                        <h2>{{ item[1] }}</h2>

                        <p>Price: ${{ item[2] }}</p>

                        <p>Quantity: {{ item[3] }}</p>

                    </div>

                    <a href="/delete_cart/{{ item[0] }}"
                       class="delete-btn">

                        Delete

                    </a>

                </div>

                {% endfor %}

            {% else %}

                <div class="empty-cart">

                    <h2>Your Cart is Empty 😔</h2>

                    <br>

                    <a href="/menu" class="delete-btn">
                        Browse Menu
                    </a>

                </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
