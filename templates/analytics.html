<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analytics | CafeVerse Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background:
                linear-gradient(rgba(0,0,0,.75),
                rgba(0,0,0,.75)),
                url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1600');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            color: white;
        }

        .glass{
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(20px);
            border:1px solid rgba(255,255,255,.08);
        }

        .active-menu{
            background: linear-gradient(135deg,#6f4e37,#b08968);
        }
    </style>

</head>

<body>

    <!-- Sidebar -->

    <aside class="fixed top-0 left-0 w-64 h-screen glass border-r border-white/10 z-50">

        <div class="p-6 border-b border-white/10">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                class="h-16">

        </div>

        <nav class="p-4 space-y-3">

            <a href="/admin"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </a>

            <a href="/manage-products"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10">
                <i class="fa-solid fa-mug-hot"></i>
                Products
            </a>

            <a href="/orders"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10">
                <i class="fa-solid fa-box"></i>
                Orders
            </a>

            <a href="/users"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10">
                <i class="fa-solid fa-users"></i>
                Users
            </a>

            <a href="/analytics"
                class="active-menu flex items-center gap-3 p-4 rounded-xl">
                <i class="fa-solid fa-chart-pie"></i>
                Analytics
            </a>

            <a href="/settings"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-white/10">
                <i class="fa-solid fa-gear"></i>
                Settings
            </a>

            <a href="/logout"
                class="flex items-center gap-3 p-4 rounded-xl hover:bg-red-500">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>

        </nav>

    </aside>


    <div class="ml-64 p-8">

        <h1 class="text-6xl font-bold mb-3">
            📊 Analytics
        </h1>

        <p class="text-gray-300 text-xl mb-10">
            Monitor your business performance.
        </p>


        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">

            <div class="glass p-8 rounded-3xl">
                <h3>Total Revenue</h3>
                <h1 class="text-5xl font-bold mt-3">$12,500</h1>
            </div>

            <div class="glass p-8 rounded-3xl">
                <h3>Total Orders</h3>
                <h1 class="text-5xl font-bold mt-3">350</h1>
            </div>

            <div class="glass p-8 rounded-3xl">
                <h3>Total Customers</h3>
                <h1 class="text-5xl font-bold mt-3">120</h1>
            </div>

            <div class="glass p-8 rounded-3xl">
                <h3>Total Products</h3>
                <h1 class="text-5xl font-bold mt-3">25</h1>
            </div>

        </div>


        <div class="glass p-8 rounded-3xl mb-8">

            <h2 class="text-3xl font-bold mb-6">
                Monthly Sales
            </h2>

            <canvas id="salesChart"></canvas>

        </div>

    </div>


<script>

new Chart(document.getElementById('salesChart'),{

type:'line',

data:{

labels:['Jan','Feb','Mar','Apr','May','Jun','Jul'],

datasets:[{

label:'Sales ($)',

data:[1200,2500,1800,4000,3000,5500,7000],

borderColor:'#b08968',

backgroundColor:'rgba(176,137,104,.3)',

fill:true,

tension:.4

}]

},

options:{
responsive:true
}

});

</script>

</body>
</html>
