<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile</title>

<style>

    body{
        background:#f5f5f5;
        font-family:Poppins,sans-serif;
    }

    .container{

        width:500px;

        margin:60px auto;

        background:white;

        padding:40px;

        border-radius:20px;

        box-shadow:0 5px 20px rgba(0,0,0,.1);
    }

    h1{

        text-align:center;

        color:#3e2c21;

        margin-bottom:30px;
    }

    input{

        width:100%;

        padding:12px;

        margin:10px 0;

        border:1px solid #ddd;

        border-radius:10px;
    }

    button{

        width:100%;

        padding:12px;

        background:#3e2c21;

        color:white;

        border:none;

        border-radius:10px;

        cursor:pointer;
    }

</style>


</head>

<body>

<div class="container">


<h1>Edit Profile</h1>

<form
    action="/edit-profile"
    method="POST"
    enctype="multipart/form-data">

    <input
        type="text"
        name="name"
        value="{{ user[1] }}"
        required>

    <input
        type="file"
        name="image">

    <button type="submit">
        Update Profile
    </button>

</form>


</div>

</body>

</html>
